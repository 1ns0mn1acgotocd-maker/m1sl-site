    <script>
        const canvas = document.getElementById("stars");
        const ctx = canvas.getContext("2d");
        const cursorDot = document.getElementById("cursor-dot");
        
        function resize() {
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let stars = []; 
        let mouse = { x: -1000, y: -1000 };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX; 
            mouse.y = e.clientY;
            cursorDot.style.left = e.clientX + 'px'; 
            cursorDot.style.top = e.clientY + 'px';
        });

        for (let i = 0; i < 200; i++) {
            stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2, speed: Math.random() * 0.4 + 0.1, ox: Math.random() * canvas.width, oy: Math.random() * canvas.height });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(star => {
                star.oy += star.speed; 
                if (star.oy > canvas.height) star.oy = 0;
                let dx = mouse.x - star.ox, dy = mouse.y - star.oy, dist = Math.sqrt(dx * dx + dy * dy);
                let px = 0, py = 0;
                if (dist < 100) { 
                    let f = (100 - dist) / 100; 
                    px = (dx / dist) * f * -40; 
                    py = (dy / dist) * f * -40; 
                }
                ctx.fillStyle = "#00FF00"; 
                ctx.globalAlpha = 0.3;
                ctx.fillRect(star.ox + px, star.oy + py, star.size, star.size);
            });
            requestAnimationFrame(animate);
        }
        animate();

        const obs = new IntersectionObserver(ents => ents.forEach(e => { if (e.isIntersecting) e.target.classList.add("show"); }));
        document.querySelectorAll(".fade").forEach(el => obs.observe(el));
    </script>
